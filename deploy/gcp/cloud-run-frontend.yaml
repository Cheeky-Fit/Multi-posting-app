# Skeleton — replace PLACEHOLDER_* before deploy.
# Next.js SSR; listens on port 4200 (see var/docker/nginx.conf).
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: PLACEHOLDER_FRONTEND_SERVICE_NAME
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: PLACEHOLDER_FRONTEND_SERVICE_ACCOUNT
      containers:
        - image: PLACEHOLDER_ARTIFACT_REGISTRY_IMAGE_FRONTEND
          ports:
            - name: http1
              containerPort: 4200
          env:
            - name: NEXT_PUBLIC_BACKEND_URL
              valueFrom:
                secretKeyRef:
                  name: NEXT_PUBLIC_BACKEND_URL
                  key: latest
            - name: NEXT_PUBLIC_CHEEKY_MODE
              value: "true"
            - name: NEXT_PUBLIC_FIREBASE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: NEXT_PUBLIC_FIREBASE_API_KEY
                  key: latest
            - name: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
              value: cheeky-b0098.firebaseapp.com
            - name: NEXT_PUBLIC_FIREBASE_PROJECT_ID
              value: cheeky-b0098
            - name: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
              value: cheeky-b0098.firebasestorage.app
            - name: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
              value: "1024449009049"
            - name: NEXT_PUBLIC_FIREBASE_APP_ID
              value: 1:1024449009049:web:4b0a356e7d58a9a8c82f08
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
